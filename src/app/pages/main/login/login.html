<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <h2 style="color: #ff7300">¡Bienvenido a Pequeños Gigantes!</h2>
      <p>Ingresa tus credenciales para continuar</p>
    </div>

    <form (ngSubmit)="login()" #loginForm="ngForm">
      @if (errorMessage) {
        <div style="background-color: #fee; border: 1px solid #f88; padding: 10px; border-radius: 5px; margin-bottom: 15px; color: #c33;">
          {{ errorMessage }}
        </div>
      }

      @if (isLoading) {
        <div style="text-align: center; padding: 10px; color: #ff7300;">
          Verificando credenciales...
        </div>
      }

      <div class="input-group">
        <label for="email">Correo Electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          placeholder="ejemplo@correo.com"
          required
        />
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading">
        {{ isLoading ? 'Verificando...' : 'Ingresar' }}
      </button>

      <div class="login-footer">
        <a href="/">Volver al inicio</a>
        <span>o</span>
        <a routerLink="/register" class="cursor-pointer">Registrarse</a>
      </div>
    </form>
  </div>
</div>
