<section
  class="text-gray-700 body-font from-orange-50 to-white scroll-mt-[96px]"
  id="seccion-contacto"
>
  <div class="container px-5 py-24 mx-auto">
    <div class="flex flex-col text-center w-full mb-12">
      <h1 class="sm:text-4xl text-3xl font-bold title-font mb-4 text-orange-500 drop-shadow-lg">
        Contáctanos
      </h1>
      <p class="lg:w-2/3 mx-auto leading-relaxed text-lg text-gray-600">
        Envíanos tus datos para poder contactarnos contigo y asesorarte en el proceso de matrícula.
      </p>
    </div>
    <div class="lg:w-1/1.5 md:w-2/3 mx-auto bg-white rounded-xl shadow-xl p-8">
      <div class="flex flex-wrap -m-2">
        <div class="p-2 w-full md:w-1/2">
          <div class="relative">
            <label for="name" class="leading-7 text-sm text-gray-700 font-semibold">Nombre</label>
            <input
              type="text"
              id="name"
              name="name"
              class="w-full bg-orange-50 bg-opacity-70 rounded-lg border border-orange-200 focus:border-orange-500 focus:bg-white focus:ring-2 focus:ring-orange-200 text-base outline-none text-gray-800 py-2 px-4 leading-8 transition-colors duration-200 ease-in-out shadow-sm"
              placeholder="Tu nombre"
            />
          </div>
        </div>
        <div class="p-2 w-full md:w-1/2">
          <div class="relative">
            <label for="email" class="leading-7 text-sm text-gray-700 font-semibold">Correo</label>
            <input
              type="email"
              id="email"
              name="email"
              class="w-full bg-orange-50 bg-opacity-70 rounded-lg border border-orange-200 focus:border-orange-500 focus:bg-white focus:ring-2 focus:ring-orange-200 text-base outline-none text-gray-800 py-2 px-4 leading-8 transition-colors duration-200 ease-in-out shadow-sm"
              placeholder="tucorreo@ejemplo.com"
            />
          </div>
        </div>
        <div class="p-2 w-full">
          <div class="relative">
            <label for="message" class="leading-7 text-sm text-gray-700 font-semibold"
              >Mensaje</label
            >
            <textarea
              id="message"
              name="message"
              class="w-full bg-orange-50 bg-opacity-70 rounded-lg border border-orange-200 focus:border-orange-500 focus:bg-white focus:ring-2 focus:ring-orange-200 h-36 text-base outline-none text-gray-800 py-2 px-4 resize-none leading-6 transition-colors duration-200 ease-in-out shadow-sm"
              placeholder="Escribe tu mensaje aquí..."
            ></textarea>
          </div>
        </div>
        <div class="p-2 w-full">
          <button
            class="flex mx-auto font-bold text-black bg-gray-100 border-full hover:bg-orange-500 hover:text-white border-0 py-3 px-10 cursor-pointer focus:outline-none hover:from-orange-500 hover:to-orange-700 rounded-full text-lg shadow-lg transition-all duration-200"
          >
            Enviar
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
