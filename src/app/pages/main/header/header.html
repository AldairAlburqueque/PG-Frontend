<header
  class="fixed top-0 left-0 w-full z-50 bg-white/90 backdrop-blur-md shadow-sm transition-all duration-300"
>
  <div class="container mx-auto px-4 py-2 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20 md:h-24">
      <div href="#" class="flex items-center gap-3 group">
        <img
          src="img/logo.png"
          alt="Logo Pequeños Gigantes"
          class="w-25 h-25 md:w-25 md:h-25 rounded-full object-cover shadow-sm"
        />
        <span
          class="text-2xl md:text-3xl font-bold text-orange-400 group-hover:text-orange-500 transition-colors"
          style="font-family: 'Pacifico', cursive"
        >
          Pequeños Gigantes
        </span>
      </div>

      <nav class="hidden lg:flex items-center gap-6 lg:gap-8 font-bold text-gray-600">
        <a
          href="/"
          (click)="scrollToSection('seccion-inicio')"
          class="hover:text-orange-500 transition-colors cursor-pointer relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-orange-500 after:transition-all hover:after:w-full"
          >Inicio</a
        >
        <a
          (click)="scrollToSection('seccion-nosotros')"
          class="hover:text-orange-500 transition-colors cursor-pointer relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-orange-500 after:transition-all hover:after:w-full"
          >Nosotros</a
        >
        <a
          (click)="scrollToSection('seccion-clases')"
          class="hover:text-orange-500 transition-colors cursor-pointer relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-orange-500 after:transition-all hover:after:w-full"
          >Clases</a
        >
        <a
          (click)="scrollToSection('seccion-profesores')"
          class="hover:text-orange-500 transition-colors cursor-pointer relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-orange-500 after:transition-all hover:after:w-full"
          >Profesores</a
        >
        <a
          (click)="scrollToSection('seccion-contacto')"
          class="hover:text-orange-500 transition-colors cursor-pointer relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-orange-500 after:transition-all hover:after:w-full"
          >Contacto</a
        >

        <button
          routerLink="/login"
          class="bg-gray-100 hover:bg-orange-500 text-gray-800 hover:text-white cursor-pointer px-5 py-2 rounded-full font-bold transition-all duration-300 flex items-center shadow-sm hover:shadow-md transform hover:-translate-y-0.5"
        >
          Ingresar
        </button>
      </nav>

      <button
        (click)="toggleMenu()"
        class="lg:hidden text-gray-600 cursor-pointer hover:text-orange-500 focus:outline-none p-2"
        aria-label="Toggle menu"
      >
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            *ngIf="!isMobileMenuOpen"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          ></path>
          <path
            *ngIf="isMobileMenuOpen"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
    </div>
  </div>

  <div
    [class.hidden]="!isMobileMenuOpen"
    class="lg:hidden absolute top-full left-0 w-full bg-white shadow-lg border-t border-gray-100 animation-fade-in-down"
  >
    <div class="flex flex-col p-4 space-y-3 font-bold text-gray-600">
      <a
        (click)="scrollToSection('seccion-inicio')"
        class="block px-4 py-2 cursor-pointer hover:bg-orange-50 hover:text-orange-500 rounded-lg transition-colors"
        >Inicio</a
      >
      <a
        (click)="scrollToSection('seccion-nosotros')"
        class="block px-4 py-2 cursor-pointer hover:bg-orange-50 hover:text-orange-500 rounded-lg transition-colors"
        >Nosotros</a
      >
      <a
        (click)="scrollToSection('seccion-clases')"
        class="block px-4 py-2 cursor-pointer hover:bg-orange-50 hover:text-orange-500 rounded-lg transition-colors"
        >Clases</a
      >
      <a
        (click)="scrollToSection('seccion-profesores')"
        class="block px-4 py-2 cursor-pointer hover:bg-orange-50 hover:text-orange-500 rounded-lg transition-colors"
        >Profesores</a
      >
      <a
        (click)="scrollToSection('seccion-contacto')"
        class="block px-4 py-2 cursor-pointer hover:bg-orange-50 hover:text-orange-500 rounded-lg transition-colors"
        >Contacto</a
      >

      <div class="pt-2 border-t border-gray-100">
        <button
          routerLink="/login"
          class="w-full bg-orange-500 text-white px-5 py-3 cursor-pointer rounded-lg font-bold hover:bg-orange-600 transition-colors flex items-center justify-center"
        >
          Ingresar
          <svg
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            class="w-4 h-4 ml-2"
            viewBox="0 0 24 24"
          >
            <path d="M5 12h14M12 5l7 7-7 7"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>

<div class="h-20 md:h-24"></div>
